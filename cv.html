<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width,initial-scale=1" />
	<title>Omar A. Khan - CV</title>
	<link rel="icon" href="/favicon.ico" type="image/x-icon" />
	<style>
		/* Ensure page fills the viewport and no default margins */
		html, body {
			height: 100%;
			margin: 0;
			padding: 0;
		}

		/* Container stretches to full viewport height on any device */
		#my-pdf {
			box-sizing: border-box;
			width: 100%;
			height: 100vh; /* device-agnostic viewport height */
			min-height: 100vh;
			display: block;
		}

		/* Make embedded PDF fill its container */
		.pdfobject, #my-pdf iframe {
			width: 100%;
			height: 100%;
			border: none;
			display: block;
		}

	</style>
</head>
<body>
<div id="my-pdf" class="pdfobject-container"><iframe class="pdfobject" title="Embedded PDF" src="cv.pdf" allow="autoplay 'self'; fullscreen 'self'; fullscreen" style="border-width: medium; border-style: none; border-color: currentcolor; border-image: initial; width: 100%; height: 100%;" data-ruffle-polyfilled=""></iframe></div>
<!-- <script src="https://unpkg.com/pdfobject"></script>
<script>PDFObject.embed("cv.pdf", "#my-pdf");</script> -->
</body>
</html>
