<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Omar A. Khan - CV</title>
  <link rel="icon" href="/favicon.ico" type="image/x-icon" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pdfjs-dist@4.10.38/web/pdf_viewer.css" />
  <style>
    :root {
      color-scheme: light;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f3f3f3;
      color: #111;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      background: #f3f3f3;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      padding: 0.75rem 1rem;
      background: rgba(255, 255, 255, 0.96);
      border-bottom: 1px solid #ddd;
      backdrop-filter: blur(8px);
    }

    h1 {
      margin: 0;
      font-size: 1rem;
      font-weight: 650;
      line-height: 1.2;
    }

    header a {
      flex: 0 0 auto;
      border: 1px solid #111;
      border-radius: 999px;
      padding: 0.45rem 0.8rem;
      color: #111;
      text-decoration: none;
      font-size: 0.9rem;
      line-height: 1;
      background: #fff;
    }

    #viewer {
      box-sizing: border-box;
      width: 100%;
      max-width: 900px;
      margin: 0 auto;
      padding: 1rem 0.75rem 2rem;
    }

    .pdf-page {
      position: relative;
      margin: 0 auto 1rem;
      background: #fff;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.16);
      overflow: hidden;
    }

    .pdf-page canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    .textLayer,
    .manualLinkLayer {
      position: absolute;
      inset: 0;
    }

    .textLayer {
      z-index: 2;
    }

    .manualLinkLayer {
      z-index: 5;
      pointer-events: none;
    }

    .manualLinkLayer a {
      position: absolute;
      display: block;
      pointer-events: auto;
      background: transparent;
      text-decoration: none;
      cursor: pointer;
    }

    .manualLinkLayer a:focus {
      outline: 2px solid #3118be;
      outline-offset: 2px;
    }

    #status {
      padding: 2rem 1rem;
      text-align: center;
      color: #444;
    }

    #status a {
      color: inherit;
    }

    @media print {
      header,
      #status {
        display: none;
      }

      body,
      #viewer {
        background: #fff;
        padding: 0;
      }

      .pdf-page {
        box-shadow: none;
        margin: 0;
        page-break-after: always;
      }
    }
  </style>
</head>
<body>
  <header>
    <a href="index.html"> <small>home</small></a>
    <h1>Omar A. Khan - CV</h1>
    <a href="cv.pdf" download> <small>download</small></a>
  </header>

  <main id="viewer" aria-label="CV PDF viewer">
    <p id="status">Loading CV...</p>
  </main>

  <script type="module">
    import * as pdfjsLib from "https://cdn.jsdelivr.net/npm/pdfjs-dist@4.10.38/build/pdf.mjs";

    pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdn.jsdelivr.net/npm/pdfjs-dist@4.10.38/build/pdf.worker.mjs";

    const pdfUrl = "cv.pdf";
    const viewer = document.getElementById("viewer");
    let pdfDocument = null;
    let renderGeneration = 0;

    async function goToPdfDestination(destination) {
      try {
        const explicitDest = Array.isArray(destination)
          ? destination
          : await pdfDocument.getDestination(destination);

        if (!explicitDest || !explicitDest[0]) return;

        const pageIndex = await pdfDocument.getPageIndex(explicitDest[0]);
        const pageNumber = pageIndex + 1;
        const target = document.querySelector(`[data-page-number="${pageNumber}"]`);
        if (target) target.scrollIntoView({ behavior: "smooth", block: "start" });
      } catch (error) {
        console.warn("Could not navigate to internal PDF destination", error);
      }
    }

    function addManualLinks(page, viewport, linkLayer, annotations) {
      for (const annotation of annotations) {
        if (annotation.subtype !== "Link" || !annotation.rect) continue;

        const rect = viewport.convertToViewportRectangle(annotation.rect);
        const left = Math.min(rect[0], rect[2]);
        const top = Math.min(rect[1], rect[3]);
        const width = Math.abs(rect[0] - rect[2]);
        const height = Math.abs(rect[1] - rect[3]);

        if (width <= 0 || height <= 0) continue;

        const link = document.createElement("a");
        link.style.left = `${left}px`;
        link.style.top = `${top}px`;
        link.style.width = `${width}px`;
        link.style.height = `${height}px`;

        const url = annotation.url || annotation.unsafeUrl;
        if (url) {
          link.href = url;
          link.target = "_blank";
          link.rel = "noopener noreferrer";
          link.title = url;
          link.setAttribute("aria-label", `Open link: ${url}`);
        } else if (annotation.dest) {
          link.href = "#";
          link.title = "Jump within PDF";
          link.setAttribute("aria-label", "Jump within PDF");
          link.addEventListener("click", event => {
            event.preventDefault();
            goToPdfDestination(annotation.dest);
          });
        } else {
          continue;
        }

        linkLayer.appendChild(link);
      }
    }

    async function renderPage(pageNumber, availableWidth, outputScale, generation) {
      if (generation !== renderGeneration) return;

      const page = await pdfDocument.getPage(pageNumber);
      const unscaledViewport = page.getViewport({ scale: 1 });
      const cssScale = availableWidth / unscaledViewport.width;
      const viewport = page.getViewport({ scale: cssScale });
      const renderViewport = page.getViewport({ scale: cssScale * outputScale });

      const pageDiv = document.createElement("section");
      pageDiv.className = "pdf-page";
      pageDiv.dataset.pageNumber = String(pageNumber);
      pageDiv.style.width = `${Math.floor(viewport.width)}px`;
      pageDiv.style.height = `${Math.floor(viewport.height)}px`;
      pageDiv.style.setProperty("--scale-factor", viewport.scale);

      const canvas = document.createElement("canvas");
      const context = canvas.getContext("2d", { alpha: false });
      canvas.width = Math.floor(renderViewport.width);
      canvas.height = Math.floor(renderViewport.height);
      canvas.style.width = `${Math.floor(viewport.width)}px`;
      canvas.style.height = `${Math.floor(viewport.height)}px`;
      pageDiv.appendChild(canvas);

      const textLayerDiv = document.createElement("div");
      textLayerDiv.className = "textLayer";
      pageDiv.appendChild(textLayerDiv);

      const manualLinkLayer = document.createElement("div");
      manualLinkLayer.className = "manualLinkLayer";
      pageDiv.appendChild(manualLinkLayer);

      viewer.appendChild(pageDiv);

      await page.render({ canvasContext: context, viewport: renderViewport }).promise;

      const textLayer = new pdfjsLib.TextLayer({
        textContentSource: page.streamTextContent({ includeMarkedContent: true }),
        container: textLayerDiv,
        viewport,
      });
      await textLayer.render();

      const annotations = await page.getAnnotations({ intent: "display" });
      addManualLinks(page, viewport, manualLinkLayer, annotations);
    }

    async function renderPdf() {
      if (!pdfDocument) return;

      const generation = ++renderGeneration;
      viewer.innerHTML = "";

      const availableWidth = Math.min(viewer.clientWidth, 900);
      const outputScale = Math.min(Math.max(window.devicePixelRatio || 1, 2), 3);

      for (let pageNumber = 1; pageNumber <= pdfDocument.numPages; pageNumber++) {
        if (generation !== renderGeneration) return;
        await renderPage(pageNumber, availableWidth, outputScale, generation);
      }
    }

    async function loadPdf() {
      try {
        pdfDocument = await pdfjsLib.getDocument(pdfUrl).promise;
        await renderPdf();
      } catch (error) {
        console.error(error);
        viewer.innerHTML = `
          <p id="status">
            The CV could not be displayed here.
            <a href="${pdfUrl}">Open the PDF directly</a>.
          </p>
        `;
      }
    }

    let resizeTimer = null;
    window.addEventListener("resize", () => {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(renderPdf, 250);
    });

    loadPdf();
  </script>
</body>
</html>
